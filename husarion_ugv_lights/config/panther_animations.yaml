panels:
  - channel: 1
    number_of_leds: 46
  - channel: 2
    number_of_leds: 46

segments:
  - name: front
    channel: 1
    led_range: 0-45
  - name: rear
    channel: 2
    led_range: 45-0

segments_map:
  all: [front, rear]
  front: [front]
  rear: [rear]

led_animations:
  - id: 0
    name: E_STOP
    priority: 3
    animations:
      - type: husarion_ugv_lights::ImageAnimation
        segments: front
        animation:
          image: $(find husarion_ugv_lights)/animations/panther/animacje-2025-02_front_estop.png
          duration: 6
      - type: husarion_ugv_lights::ImageAnimation
        segments: rear
        animation:
          image: $(find husarion_ugv_lights)/animations/panther/animacje-2025-02_rear_estop.png
          duration: 6

  - id: 1
    name: READY
    priority: 3
    animations:
      - type: husarion_ugv_lights::ImageAnimation
        segments: front
        animation:
          image: $(find husarion_ugv_lights)/animations/panther/animacje-2025-02_front_idle.png
          duration: 6
      - type: husarion_ugv_lights::ImageAnimation
        segments: rear
        animation:
          image: $(find husarion_ugv_lights)/animations/panther/animacje-2025-02_rear_idle.png
          duration: 6

  - id: 2
    name: ERROR
    priority: 0
    animations:
      - type: husarion_ugv_lights::ImageAnimation
        segments: all
        animation:
          image: $(find husarion_ugv_lights)/animations/panther/animacje-2025-02_error.png
          duration: 2
          repeat: 2

  - id: 3
    name: MANUAL_ACTION
    priority: 3
    animations:
      - type: husarion_ugv_lights::ImageAnimation
        segments: front
        animation:
          image: $(find husarion_ugv_lights)/animations/panther/animacje-2025-02_front_work.png
          duration: 6
      - type: husarion_ugv_lights::ImageAnimation
        segments: rear
        animation:
          image: $(find husarion_ugv_lights)/animations/panther/animacje-2025-02_rear_work.png
          duration: 6

  - id: 4
    name: LOW_BATTERY
    priority: 2
    animations:
      - type: husarion_ugv_lights::MovingImageAnimation
        segments: front
        animation:
          image: $(find husarion_ugv_lights)/animations/panther/animacje-2025-02_low_battery.png
          duration: 10
          repeat: 1
          center_offset: 38
          object_width: 1
          start_offset: 0.0
          splash_duration: 10.0
      - type: husarion_ugv_lights::MovingImageAnimation
        segments: rear
        animation:
          image: $(find husarion_ugv_lights)/animations/panther/animacje-2025-02_low_battery.png
          duration: 10
          repeat: 1
          center_offset: 38
          object_width: 1
          start_offset: 0.0
          splash_duration: 10.0
          image_mirrored: true
          position_mirrored: true

