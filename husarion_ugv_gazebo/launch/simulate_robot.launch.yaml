---
launch:

  - arg:
      name: common_dir_path
      default: ''
      description: Path to the common configuration directory. If set, configs are loaded
        from <common_dir_path>/<package_name>/ instead of the package share dir.

  - let:
      name: husarion_ugv_gazebo_common_dir
      value: $(eval "'$(var common_dir_path)/husarion_ugv_gazebo' if '$(var common_dir_path)'
        else '$(find-pkg-share husarion_ugv_gazebo)'")

  - let:
      name: husarion_ugv_description_common_dir
      value: $(eval "'$(var common_dir_path)/husarion_ugv_description' if '$(var common_dir_path)'
        else '$(find-pkg-share husarion_ugv_description)'")

  - arg:
      name: add_world_transform
      default: 'False'
      description: Adds a world frame that connects the tf trees of individual robots (useful
        when running multiple robots).
      choice:
        - value: 'True'
        - value: 'False'

  - arg:
      name: battery_config_path
      default: $(var husarion_ugv_gazebo_common_dir)/config/battery_plugin.yaml
      description: Path to the Ignition LinearBatteryPlugin configuration file. This configuration
        is intended for use in simulations only.

  - arg:
      name: components_config_path
      default: $(var husarion_ugv_description_common_dir)/config/components.yaml
      description: Additional components configuration file. Components described in this
        file are dynamically included in robot's URDF.

  - arg:
      name: disable_manager
      default: 'False'
      description: Enable or disable manager_bt_node.
      choice:
        - value: 'True'
        - value: 'False'

  - arg:
      name: gz_bridge_config_path
      default: $(var husarion_ugv_gazebo_common_dir)/config/robot_bridge.yaml
      description: Path to the parameter_bridge configuration file.

  - arg:
      name: log_level
      default: INFO
      description: Logging level
      choice:
        - value: DEBUG
        - value: INFO
        - value: WARNING
        - value: ERROR
        - value: FATAL

  - arg:
      name: namespace
      default: $(env ROBOT_NAMESPACE '')
      description: Add namespace to all launched nodes.

  - arg:
      name: robot_model
      default: $(env ROBOT_MODEL_NAME panther)
      description: Specify robot model.
      choice:
        - value: lynx
        - value: panther

  - arg:
      name: x
      default: '0.0'
      description: Initial robot position in the global 'x' axis.
  - arg:
      name: y
      default: '0.0'
      description: Initial robot position in the global 'y' axis.
  - arg:
      name: z
      default: '0.2'
      description: Initial robot position in the global 'z' axis.
  - arg:
      name: roll
      default: '0.0'
      description: Initial robot 'roll' orientation.
  - arg:
      name: pitch
      default: '0.0'
      description: Initial robot 'pitch' orientation.
  - arg:
      name: yaw
      default: '0.0'
      description: Initial robot 'yaw' orientation.

  - set_use_sim_time:
      value: true

  - let:
      name: model_name
      value: $(eval "'$(var namespace)' if '$(var namespace)' else 'panther'")

  - let:
      name: ns_slash
      value: $(eval "'$(var namespace)' + '/' if '$(var namespace)' else ''")

  - let:
      name: rendered_gz_bridge_config
      value: /tmp/husarion_ugv_gz_bridge_$(var namespace).yaml

  - let:
      name: render_gz_bridge_cmd
      value: cp "$(var gz_bridge_config_path)" "$(var rendered_gz_bridge_config)" && sed
        -i -e "s|<model_name>|$(var model_name)|g" -e "s|<namespace>/|$(var ns_slash)|g"
        "$(var rendered_gz_bridge_config)"

  - executable:
      cmd: bash -c $(var render_gz_bridge_cmd)

  - let:
      name: rcl_log_level
      value: $(eval "'INFO' if '$(var log_level)' == 'DEBUG' else '$(var log_level)'")

  - include:
      file: $(find-pkg-share husarion_ugv_gazebo)/launch/spawn_robot.launch.yaml
      arg:
        - name: namespace
          value: $(var namespace)
        - name: robot_model
          value: $(var robot_model)
        - name: log_level
          value: $(var log_level)
        - name: x
          value: $(var x)
        - name: y
          value: $(var y)
        - name: z
          value: $(var z)
        - name: roll
          value: $(var roll)
        - name: pitch
          value: $(var pitch)
        - name: yaw
          value: $(var yaw)

  - include:
      file: $(find-pkg-share husarion_ugv_lights)/launch/lights.launch.yaml
      unless: $(eval "'$(var robot_model)' == 'lynx'")
      arg:
        - name: common_dir_path
          value: $(var common_dir_path)
        - name: log_level
          value: $(var log_level)
        - name: namespace
          value: $(var namespace)
        - name: use_sim
          value: 'True'

  - include:
      file: $(find-pkg-share husarion_ugv_manager)/launch/manager.launch.yaml
      unless: $(eval "'$(var robot_model)' == 'lynx' or '$(var disable_manager)' in ('True','true')")
      arg:
        - name: common_dir_path
          value: $(var common_dir_path)
        - name: log_level
          value: $(var log_level)
        - name: namespace
          value: $(var namespace)
        - name: use_sim
          value: 'True'

  - include:
      file: $(find-pkg-share husarion_ugv_controller)/launch/controller.launch.yaml
      arg:
        - name: common_dir_path
          value: $(var common_dir_path)
        - name: log_level
          value: $(var log_level)
        - name: namespace
          value: $(var namespace)
        - name: use_sim
          value: 'True'

  - include:
      file: $(find-pkg-share husarion_ugv_localization)/launch/localization.launch.yaml
      arg:
        - name: common_dir_path
          value: $(var common_dir_path)
        - name: log_level
          value: $(var log_level)
        - name: namespace
          value: $(var namespace)
        - name: use_sim
          value: 'True'

  - include:
      file: $(find-pkg-share husarion_components_description)/launch/gz_components.launch.py
      arg:
        - name: components_config_path
          value: $(var components_config_path)
        - name: namespace
          value: $(var namespace)
        - name: use_sim
          value: 'True'

  - timer:
      period: 1.0
      children:
        - node:
            pkg: ros_gz_bridge
            exec: parameter_bridge
            name: gz_bridge
            namespace: $(var namespace)
            param:
              - name: config_file
                value: $(var rendered_gz_bridge_config)
            args: >
              --ros-args
              --log-level $(var log_level)
              --log-level rcl:=$(var rcl_log_level)

  - let:
      name: child_tf
      value: $(eval "'$(var namespace)/odom' if '$(var namespace)' else 'odom'")

  - node:
      pkg: tf2_ros
      exec: static_transform_publisher
      name: static_tf_publisher
      namespace: $(var namespace)
      if: $(var add_world_transform)
      args: >
        --x $(var x)
        --y $(var y)
        --z $(var z)
        --roll $(var roll)
        --pitch $(var pitch)
        --yaw $(var yaw)
        --frame-id world
        --child-frame-id $(var child_tf)
